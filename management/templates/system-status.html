<div class="panel">
    <div class="panel-heading">
        <h2 class="panel-title">System Status Checks</h2>
    </div>

    <div class="status-layout">
        <div class="status-sidebar">
            <div id="system-reboot-required" class="info-card" style="display: none;">
                <div class="info-card-title">System Reboot</div>
                <div class="info-card-body">
                    <div id="reboot-needed" style="display: none;">
                        <button type="button" id="reboot-box-btn" class="btn btn-danger w-100">Reboot Box</button>
                        <p class="help-text">A system reboot is required to apply important updates.</p>
                    </div>
                    <div class="help-text" id="reboot-not-needed" style="display: none;">No reboot necessary</div>
                </div>
            </div>

            <div id="system-privacy-setting" class="info-card" style="display: none;">
                <div class="info-card-title">Privacy Settings</div>
                <div class="info-card-body">
                    <a href="#" id="privacy-toggle" class="action-link">
                        <span id="privacy-toggle-text">Configure Version Check</span>
                    </a>
                    <p class="help-text" id="privacy-help-text">Enable automatic checking for new Mail-in-a-Box releases</p>
                </div>
            </div>
        </div>

        <div class="status-main">
            <div id="system-checks-summary" class="mb-3"></div>

            <div id="system-checks-container"></div>
        </div>
    </div>

    <style>
        /* Two-column flexbox layout with sidebar on right */
        .status-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .status-main {
            flex: 1;
            min-width: 0;
        }

        .status-sidebar {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Mobile: Sidebar appears above main content */
        @media (max-width: 968px) {
            .status-layout {
                flex-direction: column-reverse;
            }

            .status-sidebar {
                flex: 1;
            }
        }

        .status-section {
            margin-bottom: 24px;
        }

        .status-section-header {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-strong);
        }

        .status-table {
            width: 100%;
            border-collapse: collapse;
        }

        .status-table td.status {
            width: 40px;
            font-weight: 600;
            text-align: center;
            padding: 16px 8px;
        }

        .status-table td.message {
            padding: 16px 16px 16px 1em;
            border-bottom: 1px solid var(--border);
        }

        .status-table tr:last-child td {
            border-bottom: none;
        }

        .status-table div.extra {
            display: none;
            margin-top: 1em;
            max-width: 50em;
            word-wrap: break-word;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .status-table a.showhide {
            display: none;
            font-size: 85%;
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
        }

        .status-table .pre {
            margin: 16px 0;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: var(--radius-md);
            color: var(--text-primary);
        }
    </style>

    <script type="module" src="/admin/static/js/pages/system-status.js"></script>
</div>
