[Definition]
# Matches failed FileBrowser login attempts from the nginx access log.
# Using the nginx log (not FileBrowser's own log) captures the real client IP
# since FileBrowser only sees 127.0.0.1 behind the nginx proxy.
failregex = ^<HOST> .* "POST /files/api/login HTTP/[0-9.]+" 4[0-9]{2}
ignoreregex =
