[Definition]
# Matches failed oxi.email webmail login attempts from the nginx access log.
# Using the nginx log captures the real client IP since oxi.email authenticates
# via loopback IMAP (127.0.0.1:143) and the dovecot jail would only see 127.0.0.1.
# NOTE: verify the login endpoint and response code against actual oxi.email logs
# on first deployment - the endpoint below is based on the Axum backend's typical
# auth API pattern.
failregex = ^<HOST> .* "POST /api/auth HTTP/[0-9.]+" 4[0-9]{2}
ignoreregex =
