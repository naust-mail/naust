	# Autodiscover - Outlook POSTs to this endpoint; proxy to management daemon
	# so it can handle both GET and POST. Matched case-insensitively.
	location ~* ^/(autodiscover|Autodiscover)/(autodiscover|Autodiscover)\.xml$ {
		proxy_pass http://$MANAGEMENT_HOST:10222;
		proxy_set_header X-Forwarded-For $remote_addr;
	}

	# Control Panel
	# Proxy /admin to our Python based control panel daemon. It is
	# listening on IPv4 only so use an IP address and not 'localhost'.
	rewrite ^/admin$ /admin/;
	rewrite ^/admin/munin$ /admin/munin/ redirect;
	location /admin/ {
		proxy_pass http://$MANAGEMENT_HOST:10222/;
		proxy_set_header X-Forwarded-For $remote_addr;
		# Rewrite Origin to the server's own hostname so check_origin() in
		# daemon.py passes regardless of how the operator accesses the box
		# (e.g. https://localhost:8443 in Docker dev).  nginx is the trusted
		# TLS terminator; the management port is not exposed directly.
		proxy_set_header Origin "https://$server_name";
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
		add_header Content-Security-Policy "frame-ancestors 'none';" always;
		# Show a friendly error page when the management daemon is down (e.g. mid-update).
		proxy_intercept_errors on;
		error_page 502 503 504 /admin-down.html;
	}

	# Served only via the internal error_page redirect above - not directly accessible.
	location = /admin-down.html {
		root /var/lib/naust;
		internal;
	}

	# The webmail catch-all (location /) is selected by WEBMAIL_CLIENT and
	# inserted here by web_update.py - see nginx-webmail-rav.conf,
	# nginx-webmail-roundcube.conf, nginx-webmail-snappymail.conf. For
	# WEBMAIL_CLIENT=none, nothing is inserted and the primary domain falls
	# back to the same static-file serving every other domain gets from
	# nginx-alldomains.conf.
