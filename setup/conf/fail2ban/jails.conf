# Fail2Ban configuration file for Naust. Do not edit.
# This file is re-generated on updates.

[DEFAULT]
# Whitelist our own IP addresses. 127.0.0.1/8 is the default. But our status checks
# ping services over the public interface so we should whitelist that address of
# ours too. The string is substituted during installation.
ignoreip = 127.0.0.1/8 PUBLIC_IP ::1 PUBLIC_IPV6

[dovecot]
enabled = true
filter  = dovecotimap
logpath = /var/log/mail.log
findtime = 30
maxretry = 20

[naust-management]
enabled = true
filter = naust-management-daemon
port = http,https
logpath = /var/log/syslog
maxretry = 20
findtime = 30

[naust-encryption]
enabled  = true
port     = http,https
filter   = naust-encryption
logpath  = /var/log/syslog
maxretry = 5
findtime = 60
bantime  = 1800

[naust-postfix465]
enabled  = true
port     = 465
filter   = naust-postfix-submission
logpath  = /var/log/mail.log
maxretry = 20
findtime = 30

[naust-postfix587]
enabled  = true
port     = 587
filter   = naust-postfix-submission
logpath  = /var/log/mail.log
maxretry = 20
findtime = 30

[naust-cypht]
enabled  = CYPHT_JAIL_ENABLED
port     = http,https
filter   = naust-cypht
logpath  = /var/log/cypht-auth.log
maxretry = 5
findtime = 60
bantime  = 1800

[naust-filebrowser]
enabled  = true
port     = http,https
filter   = naust-filebrowser
logpath  = /var/log/nginx/access.log
maxretry = 5
findtime = 60
bantime  = 1800

[rav]
enabled  = RAV_JAIL_ENABLED
port     = http,https
filter   = rav
logpath  = /var/log/nginx/access.log
maxretry = 5
findtime = 60
bantime  = 1800

[naust-roundcube]
enabled  = ROUNDCUBE_JAIL_ENABLED
filter   = naust-roundcube
logpath  = STORAGE_ROOT/roundcube/logs/userlogins.log
maxretry = 5
findtime = 60
bantime  = 1800

[naust-snappymail]
enabled  = SNAPPYMAIL_JAIL_ENABLED
filter   = naust-snappymail
logpath  = /var/log/auth.log
maxretry = 5
findtime = 60
bantime  = 1800

[naust-radicale]
enabled  = RADICALE_JAIL_ENABLED
port     = http,https
filter   = naust-radicale
logpath  = /var/log/radicale.log
maxretry = 5
findtime = 60
bantime  = 1800

[recidive]
enabled  = true
maxretry = 10
action   = iptables-allports[name=recidive]
# In the recidive section of jail.conf the action contains:
#
# action   = iptables-allports[name=recidive]
#            sendmail-whois-lines[name=recidive, logpath=/var/log/fail2ban.log]
#
# The last line on the action will sent an email to the configured address. This mail will
# notify the administrator that someone has been repeatedly triggering one of the other jails.
# By default we don't configure this address and no action is required from the admin anyway.
# So the notification is omitted. This will prevent message appearing in the mail.log that mail
# can't be delivered to fail2ban@$HOSTNAME.

[nginx-ratelimit]
enabled  = true
filter   = nginx-ratelimit
port     = http,https
logpath  = /var/log/nginx/access.log
findtime = 10s
maxretry = 100
bantime  = 1h
action   = iptables-multiport[name=ratelimit, port="http,https", protocol=tcp]

[postfix-sasl]
enabled  = true

[sshd]
enabled = true
maxretry = 7
bantime = 3600
