[Definition]
# Matches failed SnappyMail webmail login attempts. SnappyMail writes these
# to syslog (LOG_AUTHPRIV, tag "snappymail") when [logs] auth_logging = On
# (set by the snappymail component) - see Actions::LoggerAuthHelper()
# in its source. Same as Roundcube, SnappyMail runs via PHP-FPM behind
# nginx FastCGI, so its {request:ip} (= $_SERVER['REMOTE_ADDR']) is already
# the real client IP.
failregex = ^.*snappymail(\[\d+\])?: Auth failed: ip=<HOST> user=.*$
ignoreregex =
