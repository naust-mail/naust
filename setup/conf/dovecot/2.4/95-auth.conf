# Authentication against the manager-generated passwd-file. The daemon
# rewrites the file on every user change; Dovecot re-reads it on mtime.
# Password hashes carry explicit {BLF-CRYPT} prefixes; quota and the
# mail-crypt activation field arrive as userdb_ extras from the file.
# Syntax verified against Dovecot 2.4.2 source (db-passwd-file.c).

passdb passwd-file {
${CHAIN}  passwd_file_path = ${STORAGE_ROOT}/mail/materialized/dovecot-users
}
userdb passwd-file {
  passwd_file_path = ${STORAGE_ROOT}/mail/materialized/dovecot-users
}
