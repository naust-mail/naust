mail_plugins {
  mail_crypt = yes
}
crypt_write_algorithm = aes-256-gcm-sha256
mail_attribute {
  dict file {
    path = %{home}/dovecot-attributes
  }
}
passdb lua {
  lua_file = /etc/dovecot/mailcrypt-auth.lua
}

# Cache passdb results so the Lua->management->Argon2id unwrap runs on a
# cache miss, not on every IMAP/POP connection. The unwrapped key sits in
# the auth cache for the TTL (bounded); it is already in the mail process
# during a session, so the marginal exposure is the TTL window.
auth_cache_size = 10M
auth_cache_ttl = 5 mins
auth_cache_negative_ttl = 30 secs
