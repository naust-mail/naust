# Two things that both have to happen before 95-auth.conf, for two
# different reasons - kept in one early file rather than split further.
#
# 1. Loads mail_crypt into the global plugin list early, before any of the
#    stock conf.d files (20-imap.conf, 20-lmtp.conf, 20-pop3.conf) capture a
#    $mail_plugins snapshot into their own protocol{} blocks. Those blocks
#    expand $mail_plugins to whatever the global list holds AT THAT FILE'S
#    LOAD POSITION, not the final merged value - so mail_crypt must land in
#    the global list before file 20, or LMTP delivery silently stores mail
#    unencrypted with no error. Confirmed on a real 2.3 box: getting this
#    ordering wrong produces zero warnings and a byte-for-byte plaintext
#    maildir file.
mail_plugins = $mail_plugins mail_crypt

# 2. Declares the prefetch userdb before 95-auth.conf's passwd-file userdb.
#    userdb blocks are tried in the order they're defined until one
#    succeeds - the passwd-file entry will always succeed for a real user,
#    so if it were defined first it would win every time and prefetch (fed
#    by the Lua passdb in 96-mail-crypt.conf) would never run. The Lua
#    passdb always returns the full uid/gid/home record itself (see that
#    script), so prefetch is self-sufficient and passwd-file's userdb block
#    is never actually reached once encryption is on - it stays in
#    95-auth.conf unconditionally for the non-encrypted case.
userdb {
  driver = prefetch
}
