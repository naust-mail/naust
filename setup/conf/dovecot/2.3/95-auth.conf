# Authentication against the manager-generated passwd-file (2.3 dialect).
# Same file as 2.4 reads; per-line {BLF-CRYPT} prefixes select the scheme.
# Verified against a real 2.3 box (experiment E1): quota_storage_size
# translation works, and a missing field breaks login outright rather than
# meaning unlimited - the manager must always emit it.
#
# When encryption is on, pass = yes lets a successful verification continue
# to the Lua passdb in 96-mail-crypt.conf, which delivers the per-user mail
# key. A failed verification here still stops the chain (Dovecot's default
# behavior on passdb failure), so a wrong password can never reach the Lua
# passdb at all.

passdb {
  driver = passwd-file
  args = ${STORAGE_ROOT}/mail/materialized/dovecot-users
${CHAIN}}
userdb {
  driver = passwd-file
  args = ${STORAGE_ROOT}/mail/materialized/dovecot-users
}
