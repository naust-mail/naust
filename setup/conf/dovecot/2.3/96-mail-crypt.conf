# Encryption at rest (mail_crypt), 2.3 dialect. Loads after 95-auth.conf so
# the Lua passdb below is appended AFTER the passwd-file passdb there (which
# must have pass = yes set for the chain to reach here - see _version_23).
# The matching prefetch userdb block lives in 05-mail-crypt-early.conf,
# which must load BEFORE 95-auth.conf for a different reason - see there.
#
# mail_crypt_private_password only accepts %{userdb:...} on 2.3 (there is no
# %{passdb:...} at all - confirmed on a real box, doveconf fails outright
# with "Unknown variable '%passdb'" if attempted).
#
# Deliberately no mail_crypt_curve here: setting it globally makes mail_crypt
# auto-generate a keypair for ANY user's first save, opted in or not, which
# would silently start encrypting mail nobody holds a key for. The curve is
# only ever set inside the one-shot temp config the mailcrypt.keygen helper
# intent writes for a single `doveadm mailbox cryptokey generate` call - see
# daemon/internal/helper/intents.go. A user's keypair existing at all is the
# per-user switch; this file must never be the thing that creates one.
mail_attribute_dict = file:%h/dovecot-attributes

plugin {
  mail_crypt_save_version = 2
  mail_crypt_private_password = %{userdb:mail_crypt_private_password}
}

passdb {
  driver = lua
  args = file=/etc/dovecot/mailcrypt-auth.lua
}
