<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="30">
<title>Admin Panel Unavailable</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:         #f8f8f8;
    --card:       #ffffff;
    --border:     #ebebeb;
    --text:       #4d4d4d;
    --text-hi:    #161616;
    --muted:      #9b9b9b;
    --icon-bg:    #ebebeb;
    --code-bg:    #ebebeb;
    --track:      #ebebeb;
    --indicator:  #4d4d4d;
    --btn-bg:     #ebebeb;
    --btn-text:   #4d4d4d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:         #161616;
      --card:       #262626;
      --border:     #333333;
      --text:       #ebebeb;
      --text-hi:    #f8f8f8;
      --muted:      #9b9b9b;
      --icon-bg:    #333333;
      --code-bg:    #333333;
      --track:      #333333;
      --indicator:  #9b9b9b;
      --btn-bg:     #333333;
      --btn-text:   #ebebeb;
    }
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, Inter, ui-sans-serif, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1.25rem;
    padding: 2rem;
    max-width: 440px;
    width: 100%;
  }

  /* M3 tonal icon container */
  .icon-wrap {
    width: 52px;
    height: 52px;
    background: var(--icon-bg);
    border-radius: 0.875rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    color: var(--text-hi);
  }

  h1 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-hi);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  p {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.55;
  }
  p + p { margin-top: 0.625rem; }

  code {
    display: block;
    margin-top: 0.625rem;
    font-family: ui-monospace, 'Cascadia Code', monospace;
    font-size: 0.8125rem;
    background: var(--code-bg);
    color: var(--text-hi);
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    white-space: nowrap;
    overflow-x: auto;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--track);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 1.25rem;
  }
  .progress-fill {
    height: 100%;
    width: 100%;
    background: var(--indicator);
    border-radius: 2px;
    animation: drain 30s linear forwards;
  }
  @keyframes drain {
    from { width: 100%; }
    to   { width: 0%; }
  }

  .footer {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  /* M3 tonal button - pill shape */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    height: 36px;
    padding: 0 1rem;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 100px;
    font-size: 0.8125rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <!-- M3 tonal icon container -->
  <div class="icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="8" rx="2"/>
      <rect x="2" y="14" width="20" height="8" rx="2"/>
      <circle cx="6" cy="6" r="0.8" fill="currentColor" stroke="none"/>
      <circle cx="6" cy="18" r="0.8" fill="currentColor" stroke="none"/>
      <line x1="11" y1="6" x2="17" y2="6" stroke-width="1.5"/>
      <line x1="11" y1="18" x2="17" y2="18" stroke-width="1.5"/>
    </svg>
  </div>

  <h1>Admin panel unavailable</h1>
  <p>The management service may be updating or restarting - this usually takes less than a minute.</p>
  <p>If this persists, check that the naust service is running.</p>
  <code>sudo systemctl status naust</code>

  <div class="progress-track">
    <div class="progress-fill"></div>
  </div>

  <div class="footer">
    <a class="btn" href="">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Refresh now
    </a>
  </div>
</div>
</body>
</html>
