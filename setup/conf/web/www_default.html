<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Naust</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #f8f8f8;
    --card:     #ffffff;
    --border:   #ebebeb;
    --text:     #4d4d4d;
    --text-hi:  #161616;
    --muted:    #9b9b9b;
    --icon-bg:  #ebebeb;
    --code-bg:  #ebebeb;
    --btn-bg:   #ebebeb;
    --btn-text: #4d4d4d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #161616;
      --card:     #262626;
      --border:   #333333;
      --text:     #ebebeb;
      --text-hi:  #f8f8f8;
      --muted:    #9b9b9b;
      --icon-bg:  #333333;
      --code-bg:  #333333;
      --btn-bg:   #333333;
      --btn-text: #ebebeb;
    }
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, Inter, ui-sans-serif, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    gap: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1.25rem;
    padding: 2rem;
    max-width: 440px;
    width: 100%;
  }

  .icon-wrap {
    width: 52px;
    height: 52px;
    background: var(--icon-bg);
    border-radius: 0.875rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    color: var(--text-hi);
  }

  h1 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-hi);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  p {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.55;
  }
  p + p { margin-top: 0.625rem; }

  code {
    font-family: ui-monospace, 'Cascadia Code', monospace;
    font-size: 0.8125rem;
    background: var(--code-bg);
    color: var(--text-hi);
    padding: 0.1em 0.4em;
    border-radius: 4px;
    white-space: nowrap;
  }

  .footer {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    height: 36px;
    padding: 0 1rem;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 100px;
    font-size: 0.8125rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.7; }

  .path {
    display: block;
    margin-top: 0.625rem;
    font-family: ui-monospace, 'Cascadia Code', monospace;
    font-size: 0.8125rem;
    background: var(--code-bg);
    color: var(--text-hi);
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    white-space: nowrap;
    overflow-x: auto;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </svg>
  </div>

  <h1>Nothing to see here - yet.</h1>
  <p>This domain is running on a self-hosted Naust server. Mail is active, but no website has been set up here. If you own this box, upload files via SFTP to publish a site.</p>
  <code class="path">/home/user-data/www/</code>

  <div class="footer">
    <a class="btn" href="https://github.com/naust-mail/naust" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
        <path d="M9 18c-4.51 2-5-2-7-2"/>
      </svg>
      View on GitHub
    </a>
  </div>
</div>
</body>
</html>
