# MANAGED BY naust-web - do not edit; regenerated on every apply.
# template-version: 1

## box3.example.org

server {
	listen 80;
	listen [::]:80;

	server_name box3.example.org;
	root /tmp/invalid-path-nothing-here;
	server_tokens off;

	location / {
		return 301 https://box3.example.org$request_uri;
	}

	location /.well-known/acme-challenge/ {
		alias /home/user-data/ssl/lets_encrypt/webroot/.well-known/acme-challenge/;
	}
}

server {
	listen 443 ssl http2 default_server;
	listen [::]:443 ssl http2 default_server;

	server_name box3.example.org;
	server_tokens off;

	ssl_certificate /c.pem;
	ssl_certificate_key /k.pem;

	root /home/user-data/www/default;
	index index.html index.htm;

	location = /robots.txt {
		log_not_found off;
		access_log off;
	}

	location = /favicon.ico {
		log_not_found off;
		access_log off;
	}

	location = /naust.mobileconfig {
		alias /var/lib/naust/mobileconfig.xml;
	}
	location = /.well-known/autoconfig/mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /.well-known/mta-sts.txt {
		alias /var/lib/naust/mta-sts.txt;
	}

	location = /mail {
		return 301 /mail/;
	}
	location /mail/ {
		set $webmail_rav_backend "webmail";
		proxy_pass http://$webmail_rav_backend:3001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_connect_timeout 5s;
		proxy_send_timeout 10s;
		proxy_read_timeout 300s;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
		add_header Content-Security-Policy "frame-ancestors 'none';" always;
	}

	# Munin monitoring. muninweb serves the cron-rendered static
	# site and the graph CGI on loopback; auth is enforced here via
	# auth_request against the admin session check.
	location = /admin/munin {
		return 301 /admin/munin/;
	}
	location /admin/munin/ {
		auth_request /internal/admin-auth;
		error_page 401 403 =403 /admin/;
		proxy_pass http://127.0.0.1:4948/;
		proxy_set_header X-Forwarded-For $remote_addr;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

	add_header Strict-Transport-Security "max-age=15768000" always;

	location ~ /\.(ht|svn|git|hg|bzr) {
		log_not_found off;
		access_log off;
		deny all;
	}
}
