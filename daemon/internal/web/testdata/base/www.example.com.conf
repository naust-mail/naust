# MANAGED BY naust-web - do not edit; regenerated on every apply.
# template-version: 1

## www.example.com

server {
	listen 80;
	listen [::]:80;

	server_name www.example.com;
	root /tmp/invalid-path-nothing-here;
	server_tokens off;

	location / {
		return 301 https://www.example.com$request_uri;
	}

	location /.well-known/acme-challenge/ {
		alias /home/user-data/ssl/lets_encrypt/webroot/.well-known/acme-challenge/;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name www.example.com;
	server_tokens off;

	ssl_certificate /home/user-data/ssl/www.example.com/ssl_certificate.pem;
	ssl_certificate_key /home/user-data/ssl/www.example.com/ssl_private_key.pem;

	rewrite ^(.*) https://example.com$1 permanent;
}
