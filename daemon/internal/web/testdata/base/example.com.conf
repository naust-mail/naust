# MANAGED BY naust-web - do not edit; regenerated on every apply.
# template-version: 1

## example.com

server {
	listen 80;
	listen [::]:80;

	server_name example.com;
	root /tmp/invalid-path-nothing-here;
	server_tokens off;

	location / {
		return 301 https://example.com$request_uri;
	}

	location /.well-known/acme-challenge/ {
		alias /home/user-data/ssl/lets_encrypt/webroot/.well-known/acme-challenge/;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name example.com;
	server_tokens off;

	ssl_certificate /home/user-data/ssl/example.com/ssl_certificate.pem;
	ssl_certificate_key /home/user-data/ssl/example.com/ssl_private_key.pem;

	root /home/user-data/www/example.com;
	index index.html index.htm;

	location = /robots.txt {
		log_not_found off;
		access_log off;
	}

	location = /favicon.ico {
		log_not_found off;
		access_log off;
	}

	location = /naust.mobileconfig {
		alias /var/lib/naust/mobileconfig.xml;
	}
	location = /.well-known/autoconfig/mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /.well-known/mta-sts.txt {
		alias /var/lib/naust/mta-sts.txt;
	}

	add_header Strict-Transport-Security "max-age=15768000" always;

	location ~ /\.(ht|svn|git|hg|bzr) {
		log_not_found off;
		access_log off;
		deny all;
	}
}
