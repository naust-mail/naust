# MANAGED BY naust-web - do not edit; regenerated on every apply.
# template-version: 1

## box.example.com

server {
	listen 80;
	listen [::]:80;

	server_name box.example.com;
	root /tmp/invalid-path-nothing-here;
	server_tokens off;

	location / {
		return 301 https://box.example.com$request_uri;
	}

	location /.well-known/acme-challenge/ {
		alias /home/user-data/ssl/lets_encrypt/webroot/.well-known/acme-challenge/;
	}
}

server {
	listen 443 ssl http2 default_server;
	listen [::]:443 ssl http2 default_server;

	server_name box.example.com;
	server_tokens off;

	ssl_certificate /home/user-data/ssl/ssl_certificate.pem;
	ssl_certificate_key /home/user-data/ssl/ssl_private_key.pem;
	# ssl files hash: abc123

	root /home/user-data/www/default;
	index index.html index.htm;

	location = /robots.txt {
		log_not_found off;
		access_log off;
	}

	location = /favicon.ico {
		log_not_found off;
		access_log off;
	}

	location = /naust.mobileconfig {
		alias /var/lib/naust/mobileconfig.xml;
	}
	location = /.well-known/autoconfig/mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /.well-known/mta-sts.txt {
		alias /var/lib/naust/mta-sts.txt;
	}

	# Autodiscover - Outlook POSTs to this endpoint; proxied because
	# nginx will not serve a static file for POST. Both casings,
	# clients vary.
	location ~* ^/(autodiscover|Autodiscover)/(autodiscover|Autodiscover)\.xml$ {
		proxy_pass http://127.0.0.1:10223;
		proxy_set_header X-Forwarded-For $remote_addr;
	}

	# Control panel SPA - static files installed by setup; the daemon
	# is only in the path for /api, so a down daemon still serves the
	# panel shell, which reports connection errors itself.
	rewrite ^/admin$ /admin/;
	location /admin/ {
		root /usr/local/share/naust/frontend/dist;
		try_files $uri $uri/ /admin/index.html;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
		add_header Content-Security-Policy "frame-ancestors 'none';" always;
	}

	# Rate-limited ahead of the general API block below (nginx matches the
	# longest prefix, so this takes precedence for this one path only) -
	# login spends a deliberate, real bcrypt cost per call; see the login
	# zone in nginx-top.conf for the full reasoning and the burst tradeoff.
	location /admin/api/auth/login {
		limit_req zone=login burst=20 nodelay;
		proxy_pass http://127.0.0.1:10223/api/auth/login;
		proxy_set_header X-Forwarded-For $remote_addr;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Content-Type-Options nosniff always;
	}

	# Management API. Mounted under the panel path - root /api belongs
	# to whatever app is mounted at / (rav's own API lives there).
	location /admin/api/ {
		proxy_pass http://127.0.0.1:10223/api/;
		proxy_set_header X-Forwarded-For $remote_addr;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Content-Type-Options nosniff always;
	}

	# Internal auth subrequest target used by admin-gated app mounts
	# (auth_request); the daemon answers 200 only for a valid admin
	# credential. /internal/ is never proxied, so only this
	# subrequest can reach it.
	location = /internal/admin-auth {
		internal;
		proxy_pass http://127.0.0.1:10223/internal/auth/admin;
		proxy_pass_request_body off;
		proxy_set_header Content-Length "";
		proxy_set_header X-Original-URI $request_uri;
	}

	location / {
		set $webmail_rav_backend "127.0.0.1";
		proxy_pass http://$webmail_rav_backend:3001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_connect_timeout 5s;
		proxy_send_timeout 10s;
		proxy_read_timeout 300s;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
		add_header Content-Security-Policy "frame-ancestors 'none';" always;
	}

	# Radicale CardDAV/CalDAV.
	location /radicale/ {
		set $radicale_backend "127.0.0.1";
		rewrite ^/radicale/(.*) /$1 break;
		proxy_pass http://$radicale_backend:5232;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Script-Name /radicale;
		proxy_pass_header Authorization;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

	# DAV auto-discovery redirects.
	location = /.well-known/carddav { return 301 https://$host/radicale/; }
	location = /.well-known/caldav  { return 301 https://$host/radicale/; }

	location = /files {
		return 301 /files/;
	}
	location /files/ {
		set $filebrowser_backend "127.0.0.1";
		proxy_pass http://$filebrowser_backend:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

	# Netdata real-time monitoring. Auth is enforced via
	# auth_request against the admin session check; netdata itself
	# binds to loopback only, this is the sole external entry point.
	location = /admin/netdata {
		return 301 /admin/netdata/;
	}
	location /admin/netdata/ {
		auth_request /internal/admin-auth;
		error_page 401 403 =403 /admin/;
		# Proxy to /v1/ directly - the classic local dashboard. The
		# root serves a loader that fetches the cloud UI and nags
		# about missing plugins.
		proxy_pass http://127.0.0.1:19999/v1/;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		# Netdata streams data via chunked responses.
		proxy_buffering off;
		proxy_read_timeout 60s;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

	add_header Strict-Transport-Security "max-age=15768000" always;

	location ~ /\.(ht|svn|git|hg|bzr) {
		log_not_found off;
		access_log off;
		deny all;
	}
}
