# MANAGED BY naust-web - do not edit; regenerated on every apply.
# template-version: 1

## apps.example.com

server {
	listen 80;
	listen [::]:80;

	server_name apps.example.com;
	root /tmp/invalid-path-nothing-here;
	server_tokens off;

	location / {
		return 301 https://apps.example.com$request_uri;
	}

	location /.well-known/acme-challenge/ {
		alias /home/user-data/ssl/lets_encrypt/webroot/.well-known/acme-challenge/;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name apps.example.com;
	server_tokens off;

	ssl_certificate /home/user-data/ssl/apps.example.com/ssl_certificate.pem;
	ssl_certificate_key /home/user-data/ssl/apps.example.com/ssl_private_key.pem;

	location = /robots.txt {
		log_not_found off;
		access_log off;
	}

	location = /favicon.ico {
		log_not_found off;
		access_log off;
	}

	location = /naust.mobileconfig {
		alias /var/lib/naust/mobileconfig.xml;
	}
	location = /.well-known/autoconfig/mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /mail/config-v1.1.xml {
		alias /var/lib/naust/mozilla-autoconfig.xml;
	}
	location = /.well-known/mta-sts.txt {
		alias /var/lib/naust/mta-sts.txt;
	}

	location / {
		proxy_pass http://127.0.0.1:9000/;
		proxy_redirect off;
		proxy_set_header Host $http_host;
		proxy_set_header X-Frame-Options SAMEORIGIN;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'Upgrade';
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Host $http_host;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Real-IP $remote_addr;
	}

	location /downloads/ {
		alias /home/user-data/downloads/;
	}

	rewrite ^/old/(.*) https://example.com/new/$1 permanent;

	add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

	include /home/user-data/www/apps.example.com.conf;

	location ~ /\.(ht|svn|git|hg|bzr) {
		log_not_found off;
		access_log off;
		deny all;
	}
}
