name: Docker build check

# Verifies that all Docker images - core and optional - build successfully on
# pull requests. This catches broken Dockerfiles and bad component changes
# before they land on main, where docker-publish.yml would push broken images
# to GHCR. Optional images used to be skipped here and only caught after
# merge, which let a stale COPY path in radicale's Dockerfile land on main
# undetected - not worth the risk for the CI minutes saved.

on:
  pull_request:
    paths:
      - 'deploy/docker/**'
      - 'setup/components/**'
      - 'daemon/**'
      - 'frontend/**'
      - 'setup/components/defs/filter/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build every image in parallel (bake handles concurrency). No push -
      # this is verification only. Layer cache is shared with the publish
      # workflow so warm-cache builds here stay fast.
      - name: Build all images
        uses: docker/bake-action@v6
        with:
          files: deploy/docker/docker-compose.yml
          targets: dns,mail,management,nginx,rspamd,webmail,filebrowser,radicale,munin,clamav,beszel-hub,beszel-agent
          set: |
            *.cache-from=type=gha,scope=naust
            *.cache-to=type=gha,scope=naust,mode=max
            management.args.GIT_SHA=${{ github.sha }}
