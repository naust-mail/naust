name: Build and publish admin frontend

# Publishes a prebuilt frontend/dist build, tagged by a content hash of
# frontend/ itself (not the commit SHA or a version number) - so
# setup/management.sh can fetch "the build matching my current source"
# without anyone ever bumping a pin. Only runs when frontend/ actually
# changed, since that's the only time the hash (and therefore the build)
# can differ from what's already published.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Compute frontend content hash
        id: hash
        run: |
          echo "hash=$(python3 -c "import sys; sys.path.insert(0,'setup'); from components.artifacts import hash_files; print(hash_files('frontend'))")" >> "$GITHUB_OUTPUT"

      - name: Check if this hash was already published
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "frontend-${{ steps.hash.outputs.hash }}" >/dev/null 2>&1; then
            echo "exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.exists == '0'

      - name: Install dependencies
        if: steps.check.outputs.exists == '0'
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        if: steps.check.outputs.exists == '0'
        working-directory: frontend
        run: bunx vite build

      - name: Package dist
        if: steps.check.outputs.exists == '0'
        run: |
          tar -czf frontend-dist.tar.gz -C frontend/dist .
          sha256sum frontend-dist.tar.gz | cut -d' ' -f1 > frontend-dist.tar.gz.sha256

      - name: Generate release notes
        if: steps.check.outputs.exists == '0'
        id: notes
        run: |
          set -euo pipefail
          SHORT="${{ steps.hash.outputs.hash }}"
          SHORT="${SHORT:0:12}"

          # Find the previous frontend release tag to diff against.
          # sed -n '1p' on empty input returns empty safely.
          PREV_TAG=$(git tag --list 'frontend-*' --sort=-creatordate | sed -n '1p' || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline -- frontend/ | head -20 || true)
          else
            CHANGELOG=$(git log --oneline -- frontend/ | head -20 || true)
          fi

          # Bundle sizes - all failures are non-fatal.
          BUNDLE_SIZE=$(du -sh frontend/dist 2>/dev/null | cut -f1 || echo "n/a")
          JS_SIZE=$(find frontend/dist/assets -name '*.js' -print0 2>/dev/null \
            | xargs -0 du -ch 2>/dev/null | tail -1 | cut -f1 || echo "n/a")
          CSS_SIZE=$(find frontend/dist/assets -name '*.css' -print0 2>/dev/null \
            | xargs -0 du -ch 2>/dev/null | tail -1 | cut -f1 || echo "n/a")

          # Write notes to a temp file to avoid multiline quoting issues.
          cat > /tmp/release-notes.md << NOTES_EOF
          Automated prebuilt frontend. Consumed by setup during installation - not a user-facing release.

          ## Bundle size
          | | |
          |---|---|
          | Total dist | ${BUNDLE_SIZE} |
          | JS | ${JS_SIZE} |
          | CSS | ${CSS_SIZE} |

          ## Frontend changes since last build
          \`\`\`
          ${CHANGELOG:-No previous frontend build tag found}
          \`\`\`
          NOTES_EOF

          echo "short=${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: steps.check.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "frontend-${{ steps.hash.outputs.hash }}" \
            frontend-dist.tar.gz frontend-dist.tar.gz.sha256 \
            --title "Frontend build (${{ steps.notes.outputs.short }})" \
            --notes-file /tmp/release-notes.md \
            --prerelease
