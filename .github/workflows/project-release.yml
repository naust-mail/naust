name: Publish release

# Fires when a version tag (v1.2.3) is pushed. Packages the repo as a source
# tarball plus prebuilt Go daemon binaries (helperd, managerd, muninweb, boxctl) and publishes
# them as one GitHub release. This is what `boxctl update` fetches and what
# setup's daemon component pulls binaries from (gobuild.py matches the
# attached daemon.hash against its local daemon/ tree before trusting them).
# It is separate from the frontend hash builds (frontend-release.yml) which
# are not full releases.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v2026.07.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: ${{ inputs.version }} (expected v2026.07.0)"
            exit 1
          fi

      - name: Check version is greater than latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW="${{ inputs.version }}"
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            exit 0
          fi
          if [ "$NEW" = "$LATEST" ]; then
            echo "Version $NEW already exists."
            exit 1
          fi
          HIGHEST=$(printf '%s\n%s' "$NEW" "$LATEST" | sort -V | tail -1)
          if [ "$HIGHEST" != "$NEW" ]; then
            echo "Version $NEW must be greater than latest release $LATEST"
            exit 1
          fi

      - name: Package source tarball
        run: |
          VERSION="${{ inputs.version }}"
          # Write version file into the archive so installed boxes know their version
          # without needing git history (git archive strips it).
          echo "$VERSION" > VERSION
          git archive --format=tar.gz --prefix="naust-${VERSION}/" \
            --add-file=VERSION HEAD \
            -o "naust-${VERSION}.tar.gz"
          rm VERSION
          sha256sum "naust-${VERSION}.tar.gz" | cut -d' ' -f1 > "naust-${VERSION}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TARBALL=naust-${VERSION}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Test daemon
        working-directory: daemon
        run: go test ./...

      - name: Build daemon binaries
        run: |
          set -euo pipefail
          mkdir -p /tmp/assets
          # daemon.hash lets setup verify its local daemon/ tree is the one
          # these binaries were built from (see setup/components/gobuild.py).
          python3 -c "import sys; sys.path.insert(0,'setup'); from components.artifacts import hash_files; print(hash_files('daemon'))" > /tmp/assets/daemon.hash
          cd daemon
          for cmd in helperd managerd muninweb boxctl; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
                go build -trimpath -ldflags "-s -w" -o "/tmp/assets/${cmd}-linux-${arch}" "./cmd/${cmd}"
              sha256sum "/tmp/assets/${cmd}-linux-${arch}" | cut -d' ' -f1 > "/tmp/assets/${cmd}-linux-${arch}.sha256"
            done
          done

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --tag creates the tag atomically with the release so no orphaned tags
          # exist if this step fails. Published manually from the GitHub UI after review.
          gh release create "$VERSION" \
            "$TARBALL" "${TARBALL}.sha256" \
            /tmp/assets/* \
            --tag "$VERSION" \
            --title "Naust $VERSION" \
            --generate-notes \
            --draft
