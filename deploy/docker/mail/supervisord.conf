[supervisord]
# Log to stdout so Docker captures all output via 'docker logs'.
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

# ---- Postfix ----
[program:postfix]
# Clean stale lock/pid files before start: postfix start-fg does not forward
# SIGTERM to the master daemon, so a SIGTERM stop can orphan master.pid and
# master.lock and cause "mail system is already running" on the next start.
command=/bin/sh -c 'rm -f /var/spool/postfix/pid/master.pid /var/lib/postfix/master.lock && exec /usr/sbin/postfix start-fg'
autostart=true
autorestart=true
# Send SIGTERM to the entire process group so the master daemon is also
# signalled, not just the start-fg shell wrapper.
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
# Postfix must start before others that rely on SMTP relay.
priority=10

# ---- Dovecot ----
[program:dovecot]
command=/usr/sbin/dovecot -F
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

# ---- Control socket server ----
# Accepts service lifecycle requests from the management container over a
# Unix socket and dispatches to /etc/naust/handlers/<service> <action>.
# Returns synchronous OK/ERROR so management gets real error propagation.
[program:control-socket]
command=/bin/bash -c 'source /etc/naust.conf && exec /usr/local/sbin/control-socket-server "$STORAGE_ROOT/sockets/mail.sock" /etc/naust/handlers'
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50
